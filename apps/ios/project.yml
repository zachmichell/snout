name: Snout
options:
  bundleIdPrefix: app.snout
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en
  xcodeVersion: "16.0"
  groupSortPosition: top
settings:
  base:
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
packages:
  Supabase:
    url: https://github.com/supabase-community/supabase-swift
    from: 2.5.1
  Stripe:
    # PaymentSheet provides the native SetupIntent UI for saving cards.
    # iOS deployment target is 17 (see options.deploymentTarget); recent
    # Stripe SDK versions track current Apple SDKs and require iOS 13+.
    url: https://github.com/stripe/stripe-ios
    from: 24.0.0
targets:
  Snout:
    type: application
    platform: iOS
    sources:
      - path: Snout
    resources:
      - path: Snout/Resources/Assets.xcassets
      - path: Snout/Resources/Fonts
    info:
      path: Snout/Resources/Info.plist
      properties:
        CFBundleDisplayName: Snout
        # Required so App Store Connect resolves the app icon from the
        # AppIcon asset catalog set; without it the upload validator
        # rejects with "Missing Info.plist value CFBundleIconName".
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSCameraUsageDescription: "Snout needs camera access if you ever want to attach a photo to a message."
        NSPhotoLibraryUsageDescription: "Snout saves report card photos to your library when you tap Save."
        NSUserNotificationsUsageDescription: "Snout sends you report cards, photos, and booking updates from your facility."
        UIAppFonts:
          - GrandifloraOne-Regular.ttf
          - Montserrat-Regular.ttf
          - Montserrat-Medium.ttf
          - Montserrat-SemiBold.ttf
          - Montserrat-Bold.ttf
    settings:
      base:
        # Must match the App ID registered in Apple Developer Portal for the
        # Snout iOS app — the team's profiles (Snout Development, Snout Ad Hoc)
        # are tied to this bundle ID. Changing it requires registering a new
        # App ID + new profiles. Tests/UI tests can use the app.snout.* prefix
        # because they don't need their own App IDs.
        PRODUCT_BUNDLE_IDENTIFIER: org.snoutapp.snout
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        # Until a paid Apple Developer team is set up, skip signing entirely.
        # When you do add a team, replace these with DEVELOPMENT_TEAM: "<TEAMID>"
        # and remove the three lines below.
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: Supabase
        product: Supabase
      - package: Stripe
        product: StripePaymentSheet
  SnoutStaff:
    type: application
    platform: iOS
    # Staff/operator app. Shares the backend, data models, theme, and
    # Supabase client with the client app by compiling those specific files
    # from Snout/ (NOT the whole client app). No Stripe dependency in v1 —
    # POS/payments is a later phase.
    sources:
      - path: SnoutStaff
      - path: Snout/AppConfig.swift
      - path: Snout/SnoutTheme.swift
      - path: Snout/Services/SupabaseClient.swift
      - path: Snout/Services/AuthService.swift
      - path: Snout/Models
      - path: Snout/Utilities
      # Resources are declared as per-file `sources` with buildPhase: resources
      # (NOT under a `resources:` block). The Snout target's `sources:[path:Snout]`
      # directory walk already claims these files, and XcodeGen will not duplicate
      # a cross-target `resources:` reference into a second target — the result is
      # a SnoutStaff bundle with no app icon / fonts / Config.plist (App Store
      # upload then fails ITMS-90022/90023/90713). Listing them as explicit
      # per-file sources forces a SnoutStaff-specific resources build phase.
      - path: Snout/Resources/Assets.xcassets
        buildPhase: resources
      - path: Snout/Resources/Fonts
        buildPhase: resources
      # Supabase URL + anon key. Gitignored; generated by ci_post_clone.sh on
      # CI, present locally for dev.
      - path: Snout/Resources/Config.plist
        buildPhase: resources
    info:
      path: SnoutStaff/Resources/Info.plist
      properties:
        CFBundleDisplayName: Snout Staff
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UILaunchScreen:
          UIColorName: "AccentColor"
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        NSCameraUsageDescription: "Snout Staff uses the camera to capture report card, pet, and incident photos."
        NSPhotoLibraryUsageDescription: "Snout Staff attaches photos from your library to report cards and records."
        NSFaceIDUsageDescription: "Snout Staff uses Face ID to lock the app, since it shows client information."
        NSUserNotificationsUsageDescription: "Snout Staff notifies you about new bookings, messages, assignments, and incidents."
        UIBackgroundModes:
          - remote-notification
        UIAppFonts:
          - GrandifloraOne-Regular.ttf
          - Montserrat-Regular.ttf
          - Montserrat-Medium.ttf
          - Montserrat-SemiBold.ttf
          - Montserrat-Bold.ttf
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: org.snoutapp.snoutstaff
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        GENERATE_INFOPLIST_FILE: NO
        CODE_SIGN_IDENTITY: ""
        CODE_SIGNING_REQUIRED: NO
        CODE_SIGNING_ALLOWED: NO
    dependencies:
      - package: Supabase
        product: Supabase
  SnoutTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SnoutTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.snout.ios.tests
        BUNDLE_LOADER: $(TEST_HOST)
        TEST_HOST: $(BUILT_PRODUCTS_DIR)/Snout.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/Snout
    dependencies:
      - target: Snout
  SnoutUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SnoutUITests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.snout.ios.uitests
        TEST_TARGET_NAME: Snout
    dependencies:
      - target: Snout
schemes:
  Snout:
    build:
      targets:
        Snout: all
        SnoutTests: [test]
        SnoutUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - SnoutTests
        - SnoutUITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
  SnoutStaff:
    build:
      targets:
        SnoutStaff: all
    run:
      config: Debug
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

name: Test

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      # Fails the build on any TypeScript error. `bun run build` uses
      # esbuild and does NOT type-check, so this is the gate that keeps
      # type regressions out of main.
      - run: bun run typecheck

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # Bun is the project's package manager (only bun.lock exists; no
      # package-lock.json). `npm ci` would fail immediately. Install
      # via setup-bun, then `bun install --frozen-lockfile` reproduces
      # the locked dependency tree exactly. Node still needed because
      # vitest and a few transitive packages call out to it.
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: bun install --frozen-lockfile
      - run: bun run test
      # `bun run test` invokes the root package.json "test" script
      # which delegates to `bun run --cwd apps/web test` (vitest run).
      # NOT `bun test` which would invoke Bun's built-in test runner
      # against test files vitest doesn't own.

  integration:
    name: Integration tests
    runs-on: ubuntu-latest
    # Now enforcing. The schema baseline gap was closed by migration
    # 20260423234000_baseline_missing_schema.sql (PR #29/#30) and the
    # localStorage + capacity bugs that surfaced once tests actually ran
    # were fixed by PR #31/#32.
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: supabase/setup-cli@v1
        with:
          # Pinned: `latest` ships a `supabase start` that always runs an
          # "Updating vector buckets" post-init step, even with `-x vector`
          # and `[analytics] enabled = false` — it exits 409 in CI because
          # Vector isn't reachable. 1.226.4 is a known-real release that
          # predates that regression and starts cleanly with Postgres /
          # PostgREST / GoTrue / Storage / Realtime — all the integration
          # tests need.
          version: 1.226.4

      - name: Start local Supabase
        run: supabase start -x vector,logflare,analytics,studio

      - name: Capture Supabase env
        id: supabase
        run: |
          API_URL=$(supabase status -o env | grep '^API_URL=' | cut -d= -f2- | tr -d '"')
          SERVICE_KEY=$(supabase status -o env | grep '^SERVICE_ROLE_KEY=' | cut -d= -f2- | tr -d '"')
          echo "url=$API_URL" >> "$GITHUB_OUTPUT"
          echo "::add-mask::$SERVICE_KEY"
          echo "key=$SERVICE_KEY" >> "$GITHUB_OUTPUT"

      - run: bun install --frozen-lockfile

      - name: Run integration tests
        env:
          SUPABASE_TEST_URL: ${{ steps.supabase.outputs.url }}
          SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ steps.supabase.outputs.key }}
        run: bun run test:integration

      - name: Stop local Supabase
        if: always()
        run: supabase stop --no-backup
